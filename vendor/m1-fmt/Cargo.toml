[package]
name = "m1-fmt"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "m1-fmt"
path = "src/main.rs"

[lib]
name = "m1_fmt"
path = "src/lib.rs"

[dependencies]
m1-core = { path = "../m1-core" }
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
proptest = "1"

[profile.release]
opt-level = 3
