[package]
name = "m1-lsp"
version = "0.1.0"
edition = "2021"
description = "Language server for the MoTeC M1 script language (.m1scr)"
publish = false

[[bin]]
name = "m1-lsp"
path = "src/main.rs"

[lib]
name = "m1_lsp"
path = "src/lib.rs"

[dependencies]
tower-lsp = "0.20"
tokio = { version = "1", features = ["rt-multi-thread", "io-std", "macros"] }
dashmap = "5"
m1-core = { path = "../m1-core" }
# m1-lint / m1-fmt added in Tasks 7-8.

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "io-std", "io-util", "macros"] }
