[package]
name = "m1-lsp"
version = "0.2.0"
edition = "2021"
description = "Language server for the MoTeC M1 script language (.m1scr)"
publish = false

[[bin]]
name = "m1-lsp"
path = "src/main.rs"

[lib]
name = "m1_lsp"
path = "src/lib.rs"

[dependencies]
tower-lsp = "0.20"
tokio = { version = "1", features = ["rt-multi-thread", "io-std", "macros"] }
dashmap = "5"
serde_json = "1"
m1-core = { path = "vendor/m1-core" }
m1-lint = { path = "vendor/m1-lint" }
m1-fmt = { path = "vendor/m1-fmt" }
m1-typecheck = { path = "vendor/m1-typecheck" }

[dev-dependencies]
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "io-std", "io-util", "macros"] }
